/* General Styles */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  background: #f9f9f9;
  color: #333;
}

/* Header */
.header {
  background: #222;
  color: #fff;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header nav a {
  color: #fff;
  margin-left: 15px;
  text-decoration: none;
  font-weight: bold;
}

.header nav a:hover,
.header nav .active {
  color: #ffcc00;
}

/* Contact Section */
.contact-section {
  max-width: 1000px;
  margin: 40px auto;
  padding: 20px;
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
}

.contact-section h2 {
  text-align: center;
  color: #444;
}

.contact-section p {
  text-align: center;
  margin-bottom: 30px;
  color: #666;
}

.contact-container {
  display: flex;
  flex-wrap: wrap;
  gap: 30px;
  justify-content: space-between;
}

/* Form Styles */
.contact-form {
  flex: 1;
  min-width: 280px;
  display: flex;
  flex-direction: column;
}

.contact-form label {
  margin: 5px 0 5px;
  font-weight: bold;
}

.contact-form input,
.contact-form textarea {
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
  outline: none;
  transition: border 0.3s;
}

.contact-form input:focus,
.contact-form textarea:focus {
  border: 1px solid #ffcc00;
}

.contact-form button {
  margin-top: 15px;
  padding: 12px;
  background: #ffcc00;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.contact-form button:hover {
  background: #e6b800;
}

/* Contact Info */
.contact-info {
  flex: 1;
  min-width: 280px;
}

.contact-info h3 {
  margin-bottom: 15px;
  color: #444;
}

.contact-info p {
  margin: 8px 0;
  line-height: 1.5;
}

/* Footer */
.footer {
  text-align: center;
  padding: 15px;
  background: #222;
  color: #fff;
  margin-top: 40px;
  font-size: 14px;
}
