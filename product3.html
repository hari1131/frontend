<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Order Page</title>
    <style>
        
         
        nav{
             background-color:whitesmoke;
            height: 50px;
        }
          li:hover{
            background-color: cornsilk;
        }
          ol{
            display: flex;
            justify-content: space-around;
            padding: 10px;
            margin: center;
            margin-left: 500px;
            margin-right: 500px;
            
        }
        button{
            margin-left: 100px;
        }
        li{
            /* border: 1px solid rgb(185, 158, 106); */
            padding: 5px;
        }
        body {
            
            font-family: sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            
        }
        .product-grid {
            display: grid;
            
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .product {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 15px;
            text-align: center;
        }
        .product img {
            width: 100%;
            max-height: 150px;
            object-fit: contain;
            border-radius: 8px;
        }
        .product h3 {
            margin: 10px 0 5px;
            font-size: 1.1rem;
        }
        .product p {
            margin: 5px 0;
            color: #555;
        }
        .order-btn {
            background: #007bff;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .order-btn:hover {
            background:wheat;
        }
    </style>
</head>
